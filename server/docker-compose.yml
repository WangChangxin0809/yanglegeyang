# 牛马日记 — 数据库服务（本地开发 & 服务器部署通用）
# 使用方式: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: hustle_diary_pg
    restart: always
    environment:
      POSTGRES_DB: ${PG_DATABASE:-yanglegeyang}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${PG_DOCKER_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hustle_diary_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
